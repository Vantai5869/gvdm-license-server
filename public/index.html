<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GVDM – Quản lý kích hoạt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f2f2f7;
    --surface:  #ffffff;
    --surface2: #f2f2f7;
    --label:    #1c1c1e;
    --label2:   #6d6d72;
    --sep:      #d1d1d6;
    --blue:     #007aff;
    --indigo:   #5856d6;
    --red:      #ff3b30;
    --green:    #34c759;
    --r:        12px;
  }

  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         font-size: 15px; color: var(--label); min-height: 100vh; }

  /* ── Login ── */
  #loginWrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card { background: var(--surface); border-radius: 20px; padding: 36px 32px;
                width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo .icon { width: 64px; height: 64px; border-radius: 16px;
                      background: linear-gradient(160deg,#5856d6,#007aff); display: inline-flex;
                      align-items: center; justify-content: center; font-size: 30px; }
  .login-logo h1 { margin-top: 12px; font-size: 20px; font-weight: 700; }
  .login-logo p  { margin-top: 4px; font-size: 13px; color: var(--label2); }
  .field { margin-top: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--label2);
                 text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .field input { width: 100%; border: 1.5px solid var(--sep); border-radius: var(--r);
                 padding: 10px 14px; font-size: 15px; font-family: inherit;
                 background: var(--surface2); outline: none; transition: border .15s; }
  .field input:focus { border-color: var(--blue); }
  .btn-primary { width: 100%; margin-top: 20px; padding: 12px; border-radius: var(--r);
                 background: var(--indigo); color: #fff; border: none; font-size: 16px;
                 font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .btn-primary:active { opacity: .75; }
  .login-err { margin-top: 10px; font-size: 13px; color: var(--red); text-align: center; min-height: 18px; }

  /* ── Main ── */
  #mainWrap { display: none; max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; }
  .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .page-header .icon { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
                       background: linear-gradient(160deg,#5856d6,#007aff); display: flex;
                       align-items: center; justify-content: center; font-size: 22px; }
  .page-header h1 { font-size: 22px; font-weight: 700; }
  .page-header .hdr-btns { margin-left: auto; display: flex; gap: 8px; }
  .page-header .hdr-btns button { background: none; border: 1px solid var(--sep);
                         border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer;
                         color: var(--label2); font-family: inherit; }
  .page-header .hdr-btns button:hover { background: var(--surface2); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50;
                    display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-card { background: var(--surface); border-radius: 20px; padding: 28px 24px;
                width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
  .modal-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--sep); border-radius: 10px;
                padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer;
                font-family: inherit; color: var(--label2); }
  .btn-cancel:hover { background: var(--surface2); }

  .section { background: var(--surface); border-radius: 16px; overflow: hidden;
             box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 20px; }
  .section-header { padding: 14px 18px; border-bottom: 1px solid var(--sep);
                    font-weight: 600; font-size: 13px; text-transform: uppercase;
                    letter-spacing: .5px; color: var(--label2); background: var(--surface2); }

  /* Mode row */
  .mode-row { padding: 16px 18px; display: flex; align-items: center; gap: 12px; }
  .mode-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-pill { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--sep);
               background: transparent; font-size: 14px; font-weight: 500; cursor: pointer;
               color: var(--label2); font-family: inherit; transition: all .15s; }
  .mode-pill.active { background: var(--indigo); color: #fff; border-color: transparent; font-weight: 600; }
  .mode-desc { padding: 0 18px 14px; font-size: 13px; color: var(--label2); }

  /* Code section */
  #codesSection { display: none; }
  .add-row { padding: 14px 18px; display: flex; gap: 10px; border-bottom: 1px solid var(--sep); }
  .add-row input { flex: 1; border: 1.5px solid var(--sep); border-radius: 10px;
                   padding: 9px 13px; font-size: 14px; font-family: inherit;
                   background: var(--surface2); outline: none; transition: border .15s; }
  .add-row input:focus { border-color: var(--blue); }
  .btn-add { padding: 9px 18px; border-radius: 10px; background: var(--indigo); color: #fff;
             border: none; font-size: 14px; font-weight: 600; cursor: pointer;
             font-family: inherit; white-space: nowrap; transition: opacity .15s; }
  .btn-add:active { opacity: .75; }

  /* Table */
  .code-table { width: 100%; border-collapse: collapse; }
  .code-table th { padding: 10px 18px; text-align: left; font-size: 12px; font-weight: 600;
                   color: var(--label2); text-transform: uppercase; letter-spacing: .4px;
                   border-bottom: 1px solid var(--sep); background: var(--surface2); }
  .code-table td { padding: 12px 18px; border-bottom: 1px solid var(--sep); font-size: 14px; }
  .code-table tr:last-child td { border-bottom: none; }
  .code-table tr:hover td { background: var(--surface2); }
  .code-badge { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px;
                background: var(--surface2); border: 1px solid var(--sep); border-radius: 6px;
                padding: 3px 8px; letter-spacing: .5px; }
  .date-txt { font-size: 12px; color: var(--label2); }
  .btn-del { background: none; border: none; cursor: pointer; color: var(--red);
             font-size: 16px; padding: 2px 6px; border-radius: 6px;
             transition: background .15s; font-family: inherit; }
  .btn-del:hover { background: rgba(255,59,48,.1); }
  .empty-row td { text-align: center; padding: 28px; color: var(--label2); font-size: 14px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: #1c1c1e; color: #fff; padding: 10px 20px; border-radius: 20px;
           font-size: 14px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .add-row { flex-direction: column; }
    .btn-add { width: 100%; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">✏️</div>
      <h1>GVDM</h1>
      <p>Quản lý kích hoạt extension</p>
    </div>
    <div class="field">
      <label>Tên đăng nhập</label>
      <input id="inpUser" type="text" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <input id="inpPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btnLogin">Đăng nhập</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Main -->
<div id="mainWrap">
  <div class="page-header">
    <div class="icon">✏️</div>
    <h1>Quản lý kích hoạt</h1>
    <div class="hdr-btns">
      <button id="btnOpenChangePass">Đổi mật khẩu</button>
      <button id="btnLogout">Đăng xuất</button>
    </div>
  </div>

  <!-- Mode -->
  <div class="section">
    <div class="section-header">Chế độ truy cập</div>
    <div class="mode-row">
      <div class="mode-pills">
        <button class="mode-pill active" data-mode="allow_all">Cho phép tất cả</button>
        <button class="mode-pill" data-mode="code_required">Giới hạn bằng mã</button>
      </div>
    </div>
    <div class="mode-desc" id="modeDesc">Tất cả người dùng có extension đều dùng được, không cần mã.</div>
  </div>

  <!-- Codes -->
  <div class="section" id="codesSection">
    <div class="section-header">Danh sách mã kích hoạt</div>
    <div class="add-row">
      <input id="inpNote" type="text" placeholder="Ghi chú (tuỳ chọn, VD: Trường THCS X)">
      <button class="btn-add" id="btnAddCode">+ Tạo mã mới</button>
    </div>
    <table class="code-table">
      <thead>
        <tr>
          <th>Mã kích hoạt</th>
          <th>Ghi chú</th>
          <th>Ngày tạo</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="codesBody">
        <tr class="empty-row"><td colspan="4">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal đổi mật khẩu -->
<div class="modal-backdrop" id="changePassModal" style="display:none">
  <div class="modal-card">
    <h2>Đổi mật khẩu admin</h2>
    <div class="field">
      <label>Mật khẩu hiện tại</label>
      <input id="inpCurPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="field">
      <label>Mật khẩu mới</label>
      <input id="inpNewPass" type="password" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Xác nhận mật khẩu mới</label>
      <input id="inpConfPass" type="password" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password">
    </div>
    <div id="changePassErr" style="font-size:13px;color:var(--red);min-height:16px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelPass">Huỷ</button>
      <button class="btn-add" id="btnChangePass">Lưu mật khẩu</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';  // same origin
  let _auth = '';  // Basic auth header value

  function authHeader() {
    return 'Basic ' + btoa(_auth);
  }

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
  }

  // ── Login ──
  async function doLogin() {
    const user = document.getElementById('inpUser').value.trim();
    const pass = document.getElementById('inpPass').value;
    const err  = document.getElementById('loginErr');
    err.textContent = '';

    if (!user || !pass) { err.textContent = 'Vui lòng nhập đầy đủ'; return; }

    _auth = `${user}:${pass}`;

    try {
      const r = await fetch(`${API}/api/admin/settings`, {
        headers: { Authorization: authHeader() }
      });
      if (r.status === 401) { err.textContent = 'Sai tên đăng nhập hoặc mật khẩu'; _auth = ''; return; }
      const data = await r.json();
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('mainWrap').style.display  = 'block';
      applyMode(data.mode);
      loadCodes();
    } catch {
      err.textContent = 'Không kết nối được server';
      _auth = '';
    }
  }

  document.getElementById('btnLogin').addEventListener('click', doLogin);
  document.getElementById('inpPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // ── Modal đổi mật khẩu ──
  function openChangePassModal() {
    document.getElementById('inpCurPass').value = '';
    document.getElementById('inpNewPass').value = '';
    document.getElementById('inpConfPass').value = '';
    document.getElementById('changePassErr').textContent = '';
    document.getElementById('changePassModal').style.display = 'flex';
    document.getElementById('inpCurPass').focus();
  }
  document.getElementById('btnOpenChangePass').addEventListener('click', openChangePassModal);
  document.getElementById('btnCancelPass').addEventListener('click', () => {
    document.getElementById('changePassModal').style.display = 'none';
  });
  document.getElementById('changePassModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.style.display = 'none';
  });

  document.getElementById('btnLogout').addEventListener('click', () => {
    _auth = '';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('mainWrap').style.display  = 'none';
    document.getElementById('inpPass').value = '';
  });

  // ── Mode ──
  const modeDescs = {
    allow_all:      'Tất cả người dùng có extension đều dùng được, không cần mã.',
    code_required:  'Chỉ những người có mã kích hoạt hợp lệ mới dùng được.',
  };

  function applyMode(mode) {
    document.querySelectorAll('.mode-pill').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode)
    );
    document.getElementById('modeDesc').textContent = modeDescs[mode] || '';
    document.getElementById('codesSection').style.display = mode === 'code_required' ? 'block' : 'none';
  }

  document.querySelectorAll('.mode-pill').forEach(btn => {
    btn.addEventListener('click', async () => {
      const mode = btn.dataset.mode;
      applyMode(mode);
      await fetch(`${API}/api/admin/settings`, {
        method: 'PUT',
        headers: { Authorization: authHeader(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode }),
      });
      showToast(mode === 'allow_all' ? 'Đã bật chế độ cho phép tất cả' : 'Đã bật chế độ giới hạn mã');
      if (mode === 'code_required') loadCodes();
    });
  });

  // ── Codes ──
  async function loadCodes() {
    const tbody = document.getElementById('codesBody');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Đang tải...</td></tr>';
    const r = await fetch(`${API}/api/admin/codes`, { headers: { Authorization: authHeader() } });
    const { codes } = await r.json();
    renderCodes(codes);
  }

  function renderCodes(codes) {
    const tbody = document.getElementById('codesBody');
    if (!codes || codes.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Chưa có mã nào. Tạo mã đầu tiên bên trên.</td></tr>';
      return;
    }
    tbody.innerHTML = codes.map(c => `
      <tr>
        <td><span class="code-badge">${c.code}</span></td>
        <td>${c.note || '<span style="color:var(--label2)">—</span>'}</td>
        <td><span class="date-txt">${formatDate(c.createdAt)}</span></td>
        <td><button class="btn-del" data-code="${c.code}" title="Xoá mã">✕</button></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', () => deleteCode(btn.dataset.code));
    });
  }

  document.getElementById('btnAddCode').addEventListener('click', async () => {
    const note = document.getElementById('inpNote').value.trim();
    const btn  = document.getElementById('btnAddCode');
    btn.disabled = true;
    btn.textContent = 'Đang tạo...';

    const r = await fetch(`${API}/api/admin/codes`, {
      method: 'POST',
      headers: { Authorization: authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ note }),
    });
    const data = await r.json();
    document.getElementById('inpNote').value = '';
    btn.disabled = false;
    btn.textContent = '+ Tạo mã mới';
    showToast(`Đã tạo mã: ${data.code}`);
    loadCodes();
  });

  async function deleteCode(code) {
    if (!confirm(`Xoá mã ${code}?\nExtension đang dùng mã này sẽ bị khoá.`)) return;
    await fetch(`${API}/api/admin/codes`, {
      method: 'DELETE',
      headers: { Authorization: authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    showToast('Đã xoá mã');
    loadCodes();
  }

  // ── Đổi mật khẩu ──
  document.getElementById('btnChangePass').addEventListener('click', async () => {
    const cur     = document.getElementById('inpCurPass').value;
    const newPass = document.getElementById('inpNewPass').value;
    const conf    = document.getElementById('inpConfPass').value;
    const errEl   = document.getElementById('changePassErr');
    errEl.textContent = '';

    if (!cur || !newPass || !conf) { errEl.textContent = 'Vui lòng điền đầy đủ'; return; }
    if (newPass.length < 6)        { errEl.textContent = 'Mật khẩu mới phải có ít nhất 6 ký tự'; return; }
    if (newPass !== conf)          { errEl.textContent = 'Mật khẩu xác nhận không khớp'; return; }

    const btn = document.getElementById('btnChangePass');
    btn.disabled = true; btn.textContent = 'Đang lưu...';

    // Dùng mật khẩu HIỆN TẠI để xác thực, sau đó gửi mật khẩu mới
    const curAuth = 'Basic ' + btoa(`admin:${cur}`);
    const r = await fetch(`${API}/api/admin/change-password`, {
      method: 'POST',
      headers: { Authorization: curAuth, 'Content-Type': 'application/json' },
      body: JSON.stringify({ newPassword: newPass }),
    });
    const d = await r.json();

    btn.disabled = false; btn.textContent = 'Lưu mật khẩu';

    if (!r.ok) { errEl.textContent = d.error || 'Lỗi không xác định'; return; }

    // Cập nhật auth hiện tại sang mật khẩu mới và đóng modal
    _auth = `admin:${newPass}`;
    document.getElementById('changePassModal').style.display = 'none';
    showToast('Đã đổi mật khẩu thành công');
  });
</script>
</body>
</html>
